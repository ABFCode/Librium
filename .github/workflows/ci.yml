name: CI

on:
  push:
  pull_request:

# One run per ref; a new push cancels the stale run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: web

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Unit tests (node)
        run: pnpm test:node

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Component tests (browser)
        run: pnpm test:browser

      - name: Production build
        env:
          VITE_CONVEX_URL: https://placeholder.convex.cloud
          VITE_CONVEX_SITE_URL: https://placeholder.convex.site
          VITE_SITE_URL: http://localhost:3000
        run: pnpm build

  # Full local-first journey against a throwaway anonymous Convex backend.
  # Separate job so its heavier, fiddlier setup can't gate the core checks.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Start anonymous Convex backend and deploy functions
        env:
          CONVEX_AGENT_MODE: anonymous
        run: |
          # --typecheck disable: the `checks` job already runs tsc over the
          # whole project (convex/ included); re-checking here just re-resolves
          # tsconfig in a fresh env and flakes on the node `process` global.
          npx convex dev --typecheck disable > /tmp/convex.log 2>&1 &
          echo $! > /tmp/convex.pid
          # Wait for functions to finish pushing (env.local is written at
          # configure time, before the push completes — so gate on both).
          for i in $(seq 1 90); do
            if grep -qi "functions ready" /tmp/convex.log \
              && [ -f .env.local ] && grep -q VITE_CONVEX_URL .env.local; then
              READY=1; break
            fi
            sleep 2
          done
          echo '----- convex.log -----'; cat /tmp/convex.log || true
          echo '----- .env.local -----'; cat .env.local || true
          if [ -z "$READY" ]; then echo 'Convex did not become ready'; exit 1; fi
          # auth-client needs the .site URL; derive it if convex didn't write it.
          if ! grep -q VITE_CONVEX_SITE_URL .env.local; then
            SITE=$(grep VITE_CONVEX_URL .env.local | cut -d= -f2- | sed 's/3210/3211/')
            echo "VITE_CONVEX_SITE_URL=$SITE" >> .env.local
          fi

      - name: Configure auth env on the deployment
        env:
          CONVEX_AGENT_MODE: anonymous
        run: |
          npx convex env set SITE_URL http://localhost:3000
          npx convex env set BETTER_AUTH_SECRET "$(openssl rand -base64 32)"

      - name: Run e2e
        run: pnpm test:e2e

      - name: Stop Convex
        if: always()
        run: |
          kill "$(cat /tmp/convex.pid)" 2>/dev/null || true
          pkill -f 'convex' 2>/dev/null || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 7
