version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      # One PR per week for all minor/patch npm bumps (production + dev).
      # Majors still open individually so breaking changes get a real review.
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/New_York
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      # One PR for all GitHub Actions bumps (majors here are routine/low-risk).
      github-actions:
        patterns:
          - "*"
